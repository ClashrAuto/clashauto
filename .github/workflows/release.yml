name: Build and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: ClashAuto
  QT_VERSION: 6.8.3
  QT_ARCH: win64_msvc2022_64
  BUILD_DIR: build-release
  STAGE_DIR: dist/package/ClashAuto
  RUNTIME_RELEASE_TAG: v2.5.7
  RUNTIME_ASSET: Clash.Auto-amd64-2.5.7-win.zip
  RUNTIME_LINUX_ASSET: clash-auto-amd64-2.5.7.zip
  MIHOMO_REPO: MetaCubeX/mihomo

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            qt_arch: win64_msvc2022_64
            clash_core: clash-windows-amd64.exe
          - arch: arm64
            cmake_arch: ARM64
            qt_arch: win64_msvc2022_arm64_cross_compiled
            clash_core: clash-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read CMake project version
        shell: pwsh
        run: |
          $cmake = Get-Content "clashauto-c++\CMakeLists.txt" -Raw
          if ($cmake -notmatch 'project\s*\(\s*\S+\s+VERSION\s+([0-9]+(?:\.[0-9]+){1,3})') {
            throw "Cannot find project VERSION in clashauto-c++\CMakeLists.txt"
          }

          $version = $Matches[1]
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Release version: $version"

      - name: Download runtime resources
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/ClashrAuto/Clashr-Auto-Desktop/releases/download/$env:RUNTIME_RELEASE_TAG/$env:RUNTIME_ASSET"
          $zip = Join-Path $env:RUNNER_TEMP $env:RUNTIME_ASSET
          Invoke-WebRequest -Uri $url -OutFile $zip

          New-Item -ItemType Directory -Force "Clashr-Auto" | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zip)
          try {
            foreach ($entry in $archive.Entries) {
              $name = $entry.FullName.Replace('\', '/')
              if (-not ($name -eq "version" -or $name.StartsWith("command/") -or $name.StartsWith("config/") -or $name.StartsWith("language/"))) {
                continue
              }

              $target = Join-Path "Clashr-Auto" $name
              if ($name.EndsWith("/")) {
                New-Item -ItemType Directory -Force $target | Out-Null
                continue
              }

              New-Item -ItemType Directory -Force (Split-Path $target) | Out-Null
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, $target, $true)
            }
          } finally {
            $archive.Dispose()
          }

          if (-not (Test-Path "Clashr-Auto\config\config.yaml")) {
            throw "Runtime resources did not contain config/config.yaml"
          }

      - name: Normalize Windows runtime core
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force "Clashr-Auto\command\clash" | Out-Null

          if ("${{ matrix.arch }}" -eq "arm64") {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:MIHOMO_REPO/releases/latest"
            $asset = $release.assets |
              Where-Object { $_.name -like "mihomo-windows-arm64-compatible-*.gz" } |
              Select-Object -First 1
            if (-not $asset) {
              $asset = $release.assets |
                Where-Object { $_.name -like "mihomo-windows-arm64-*.gz" } |
                Select-Object -First 1
            }
            if (-not $asset) {
              throw "Cannot find a Windows ARM64 mihomo release asset"
            }

            $archive = Join-Path $env:RUNNER_TEMP $asset.name
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive

            $output = "Clashr-Auto\command\clash\${{ matrix.clash_core }}"
            $inputStream = [System.IO.File]::OpenRead($archive)
            try {
              $gzipStream = [System.IO.Compression.GZipStream]::new($inputStream, [System.IO.Compression.CompressionMode]::Decompress)
              try {
                $outputStream = [System.IO.File]::Create($output)
                try {
                  $gzipStream.CopyTo($outputStream)
                } finally {
                  $outputStream.Dispose()
                }
              } finally {
                $gzipStream.Dispose()
              }
            } finally {
              $inputStream.Dispose()
            }
          }

          if (-not (Test-Path "Clashr-Auto\command\clash\${{ matrix.clash_core }}")) {
            throw "Missing Windows runtime core: ${{ matrix.clash_core }}"
          }

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop $env:QT_VERSION ${{ matrix.qt_arch }} -O C:\Qt
          $qtRoot = Get-ChildItem "C:\Qt\$env:QT_VERSION" -Directory |
            Where-Object { Test-Path (Join-Path $_.FullName "bin\qmake.exe") } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $qtRoot) {
            throw "Cannot find installed Qt root"
          }
          "QT_ROOT=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S clashauto-c++ -B $env:BUILD_DIR -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }} `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT"

      - name: Build
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Stage portable app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $stage = Join-Path $pwd $env:STAGE_DIR
          $appDir = Join-Path $stage "clashauto-c++"
          $resourceDir = Join-Path $stage "Clashr-Auto"

          New-Item -ItemType Directory -Force $appDir, $resourceDir | Out-Null
          Copy-Item "$env:BUILD_DIR\Release\clashauto-cpp.exe" $appDir -Force

          & "$env:QT_ROOT\bin\windeployqt.exe" --release --no-translations "$appDir\clashauto-cpp.exe"

          $resourceItems = @("command", "config", "language", "mihomo", "static", "version")
          foreach ($item in $resourceItems) {
            $source = Join-Path "Clashr-Auto" $item
            if (-not (Test-Path $source)) {
              Write-Host "Skipping missing resource: $source"
              continue
            }

            $target = Join-Path $resourceDir $item
            if (Test-Path $source -PathType Container) {
              robocopy $source $target /E /NFL /NDL /NJH /NJS /NP
              if ($LASTEXITCODE -le 7) {
                $global:LASTEXITCODE = 0
              } else {
                exit $LASTEXITCODE
              }
            } else {
              New-Item -ItemType Directory -Force (Split-Path $target) | Out-Null
              Copy-Item $source $target -Force
            }
          }

          if (-not (Test-Path "$appDir\clashauto-cpp.exe")) {
            throw "Missing staged executable"
          }
          if (-not (Test-Path "$resourceDir\config\config.yaml")) {
            throw "Missing staged Clashr-Auto config resources"
          }
          if (-not (Test-Path "$resourceDir\command\clash\${{ matrix.clash_core }}")) {
            throw "Missing staged Windows runtime core: ${{ matrix.clash_core }}"
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "$env:STAGE_DIR\*" -DestinationPath "dist\ClashAuto-$env:APP_VERSION-windows-${{ matrix.arch }}-portable.zip" -Force

      - name: Create installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $nsi = @'
          Unicode true
          Name "Clash Auto"
          OutFile "dist\ClashAuto-$%APP_VERSION%-windows-$%APP_ARCH%-setup.exe"
          InstallDir "$LOCALAPPDATA\ClashAuto"
          RequestExecutionLevel user

          Page directory
          Page instfiles
          UninstPage uninstConfirm
          UninstPage instfiles

          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "dist\package\ClashAuto\*"
            CreateDirectory "$SMPROGRAMS\Clash Auto"
            CreateShortcut "$SMPROGRAMS\Clash Auto\Clash Auto.lnk" "$INSTDIR\clashauto-c++\clashauto-cpp.exe"
            CreateShortcut "$DESKTOP\Clash Auto.lnk" "$INSTDIR\clashauto-c++\clashauto-cpp.exe"
            WriteUninstaller "$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$DESKTOP\Clash Auto.lnk"
            Delete "$SMPROGRAMS\Clash Auto\Clash Auto.lnk"
            RMDir "$SMPROGRAMS\Clash Auto"
            RMDir /r "$INSTDIR"
          SectionEnd
          '@
          $nsi = $nsi.Replace('$%APP_VERSION%', $env:APP_VERSION)
          $nsi = $nsi.Replace('$%APP_ARCH%', '${{ matrix.arch }}')
          $nsi | Set-Content -Path installer.nsi -Encoding UTF8
          makensis installer.nsi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClashAuto-windows-${{ matrix.arch }}
          path: |
            dist/ClashAuto-*-windows-${{ matrix.arch }}-portable.zip
            dist/ClashAuto-*-windows-${{ matrix.arch }}-setup.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Clash Auto ${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          files: |
            dist/ClashAuto-*

  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
            deb_arch: amd64
            clash_core: clash-linux-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            clash_core: clash-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read CMake project version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -nE 's/.*project\s*\(\s*[^ ]+\s+VERSION\s+([0-9]+(\.[0-9]+){1,3}).*/\1/p' clashauto-c++/CMakeLists.txt | head -n 1)"
          if [ -z "$version" ]; then
            echo "Cannot find project VERSION in clashauto-c++/CMakeLists.txt" >&2
            exit 1
          fi
          {
            echo "APP_VERSION=$version"
            echo "RELEASE_TAG=v$version"
          } >> "$GITHUB_ENV"
          echo "Release version: $version"

      - name: Download runtime resources
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/ClashrAuto/Clashr-Auto-Desktop/releases/download/${RUNTIME_RELEASE_TAG}/${RUNTIME_LINUX_ASSET}"
          zip_path="${RUNNER_TEMP}/${RUNTIME_LINUX_ASSET}"
          curl -L --fail --retry 3 -o "$zip_path" "$url"
          rm -rf Clashr-Auto
          mkdir -p Clashr-Auto

          python3 - "$zip_path" <<'PY'
          import pathlib
          import sys
          import zipfile

          zip_path = pathlib.Path(sys.argv[1])
          target_root = pathlib.Path("Clashr-Auto")
          prefixes = ("command/", "config/", "language/")
          with zipfile.ZipFile(zip_path) as archive:
              for entry in archive.infolist():
                  name = entry.filename.replace("\\", "/")
                  if not (name == "version" or name.startswith(prefixes)):
                      continue
                  target = target_root / name
                  if entry.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(entry) as src, target.open("wb") as dst:
                      dst.write(src.read())
          PY

          if [ ! -f Clashr-Auto/config/config.yaml ]; then
            echo "Runtime resources did not contain config/config.yaml" >&2
            exit 1
          fi

      - name: Normalize Linux runtime core
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Clashr-Auto/command/clash

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            core_archive="${RUNNER_TEMP}/${{ matrix.clash_core }}.gz"
            curl -L --fail --retry 3 \
              -o "$core_archive" \
              "https://raw.githubusercontent.com/ClashrAuto/Clashr-Auto-Desktop/master/clash/clash-linux-armv8-2021.07.03.gz"
            gzip -dc "$core_archive" > "Clashr-Auto/command/clash/${{ matrix.clash_core }}"
            chmod +x "Clashr-Auto/command/clash/${{ matrix.clash_core }}"
          elif [ ! -f "Clashr-Auto/command/clash/${{ matrix.clash_core }}" ]; then
            core_archive="${RUNNER_TEMP}/${{ matrix.clash_core }}.gz"
            curl -L --fail --retry 3 \
              -o "$core_archive" \
              "https://raw.githubusercontent.com/ClashrAuto/Clashr-Auto-Desktop/master/clash/clash-linux-amd64-2021.07.03.gz"
            gzip -dc "$core_archive" > "Clashr-Auto/command/clash/${{ matrix.clash_core }}"
          fi
          chmod +x "Clashr-Auto/command/clash/${{ matrix.clash_core }}"

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-tools-dev-tools \
            libgl1-mesa-dev \
            fakeroot \
            zip

      - name: Configure
        shell: bash
        run: cmake -S clashauto-c++ -B "$BUILD_DIR" -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Stage portable app
        shell: bash
        run: |
          set -euo pipefail
          stage="$STAGE_DIR"
          app_dir="$stage/clashauto-c++"
          resource_dir="$stage/Clashr-Auto"
          rm -rf "$stage"
          mkdir -p "$app_dir" "$resource_dir"

          cp "$BUILD_DIR/clashauto-cpp" "$app_dir/"
          chmod +x "$app_dir/clashauto-cpp"

          for item in command config language mihomo static version; do
            if [ -e "Clashr-Auto/$item" ]; then
              cp -a "Clashr-Auto/$item" "$resource_dir/"
            else
              echo "Skipping missing resource: Clashr-Auto/$item"
            fi
          done

          test -x "$app_dir/clashauto-cpp"
          test -f "$resource_dir/config/config.yaml"
          test -x "$resource_dir/command/clash/${{ matrix.clash_core }}"

      - name: Create portable tar.gz
        shell: bash
        run: |
          mkdir -p dist
          tar -C dist/package -czf "dist/ClashAuto-${APP_VERSION}-linux-${{ matrix.arch }}-portable.tar.gz" ClashAuto
          (cd dist/package && zip -r "../ClashAuto-${APP_VERSION}-linux-${{ matrix.arch }}-portable.zip" ClashAuto)

      - name: Create deb package
        shell: bash
        run: |
          set -euo pipefail
          pkg_root="dist/deb/ClashAuto"
          install_root="$pkg_root/opt/ClashAuto"
          mkdir -p "$install_root" "$pkg_root/usr/share/applications" "$pkg_root/usr/bin" "$pkg_root/DEBIAN"

          cp -a "$STAGE_DIR/." "$install_root/"
          ln -s /opt/ClashAuto/clashauto-c++/clashauto-cpp "$pkg_root/usr/bin/clashauto-cpp"

          cat > "$pkg_root/usr/share/applications/clashauto.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Clash Auto
          Exec=/opt/ClashAuto/clashauto-c++/clashauto-cpp
          Terminal=false
          Categories=Network;
          EOF

          installed_size="$(du -sk "$install_root" | cut -f1)"
          cat > "$pkg_root/DEBIAN/control" <<EOF
          Package: clashauto
          Version: ${APP_VERSION}
          Section: net
          Priority: optional
          Architecture: ${{ matrix.deb_arch }}
          Installed-Size: ${installed_size}
          Maintainer: Clash Auto <auto@clash.com>
          Depends: libc6, libstdc++6, libqt6core6 | libqt6core6t64, libqt6gui6 | libqt6gui6t64, libqt6widgets6 | libqt6widgets6t64, libqt6network6 | libqt6network6t64
          Description: Clash Auto Qt desktop client
           Clash Auto desktop client built with Qt Widgets.
          EOF

          fakeroot dpkg-deb --build "$pkg_root" "dist/ClashAuto-${APP_VERSION}-linux-${{ matrix.arch }}.deb"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClashAuto-linux-${{ matrix.arch }}
          path: |
            dist/ClashAuto-*-linux-${{ matrix.arch }}-portable.tar.gz
            dist/ClashAuto-*-linux-${{ matrix.arch }}-portable.zip
            dist/ClashAuto-*-linux-${{ matrix.arch }}.deb

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Clash Auto ${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          files: |
            dist/ClashAuto-*
