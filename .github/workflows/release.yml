name: Build and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: ClashAuto
  QT_VERSION: 6.8.3
  QT_ARCH: win64_msvc2022_64
  BUILD_DIR: build-release
  STAGE_DIR: dist/package/ClashAuto
  RUNTIME_RELEASE_TAG: v2.5.7
  RUNTIME_ASSET: Clash.Auto-amd64-2.5.7-win.zip
  RUNTIME_LINUX_ASSET: clash-auto-amd64-2.5.7.zip
  MIHOMO_REPO: MetaCubeX/mihomo

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            qt_arch: win64_msvc2022_64
            clash_core: clash-windows-amd64.exe
          - arch: arm64
            cmake_arch: ARM64
            qt_arch: win64_msvc2022_arm64_cross_compiled
            clash_core: clash-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build version
        shell: pwsh
        run: |
          # 基线 major.minor 取自 CMakeLists，构建号用 git 提交数自动递增（每次提交 +1）
          $cmake = Get-Content "clashauto-c++\CMakeLists.txt" -Raw
          if ($cmake -notmatch 'project\s*\(\s*\S+\s+VERSION\s+([0-9]+)(?:\.([0-9]+))?') {
            throw "Cannot find project VERSION in clashauto-c++\CMakeLists.txt"
          }

          $major = $Matches[1]
          $minor = if ($Matches[2]) { $Matches[2] } else { "0" }
          $build = "$(git rev-list --count HEAD)".Trim()
          $version = "$major.$minor.$build"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Release version: $version (build number = commit count)"

      - name: Download runtime resources
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/ClashrAuto/Clashr-Auto-Desktop/releases/download/$env:RUNTIME_RELEASE_TAG/$env:RUNTIME_ASSET"
          $zip = Join-Path $env:RUNNER_TEMP $env:RUNTIME_ASSET
          Invoke-WebRequest -Uri $url -OutFile $zip

          New-Item -ItemType Directory -Force "Clashr-Auto" | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zip)
          try {
            foreach ($entry in $archive.Entries) {
              $name = $entry.FullName.Replace('\', '/')
              if (-not ($name -eq "version" -or $name.StartsWith("command/") -or $name.StartsWith("config/") -or $name.StartsWith("language/"))) {
                continue
              }
              # 不再预装内核：跳过 command/clash/ 下的核心二进制（用户在设置里按需下载）
              if ($name.StartsWith("command/clash/")) {
                continue
              }

              $target = Join-Path "Clashr-Auto" $name
              if ($name.EndsWith("/")) {
                New-Item -ItemType Directory -Force $target | Out-Null
                continue
              }

              New-Item -ItemType Directory -Force (Split-Path $target) | Out-Null
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, $target, $true)
            }
          } finally {
            $archive.Dispose()
          }

          if (-not (Test-Path "Clashr-Auto\config\config.yaml")) {
            throw "Runtime resources did not contain config/config.yaml"
          }

      - name: Prepare runtime core dir (no pre-bundled core)
        shell: pwsh
        run: |
          # 不再预装内核：不下载、不校验核心，仅保留空的 clash 目录占位。
          # 用户首次运行时由应用引导到「设置 → 系统」按需下载 mihomo（amd64 取兼容版）。
          New-Item -ItemType Directory -Force "Clashr-Auto\command\clash" | Out-Null

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          if ("${{ matrix.arch }}" -eq "arm64") {
            python -m aqt install-qt windows desktop $env:QT_VERSION win64_msvc2022_64 -O C:\Qt
          }
          python -m aqt install-qt windows desktop $env:QT_VERSION ${{ matrix.qt_arch }} -O C:\Qt
          $qtRoot = Get-ChildItem "C:\Qt\$env:QT_VERSION" -Directory |
            Where-Object {
              (Test-Path (Join-Path $_.FullName "bin\qmake.exe")) -or
              (Test-Path (Join-Path $_.FullName "bin\qmake.bat"))
            } |
            Where-Object {
              if ("${{ matrix.arch }}" -eq "arm64") {
                $_.Name -like "*arm64*"
              } else {
                $_.Name -notlike "*arm64*"
              }
            } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $qtRoot) {
            throw "Cannot find installed Qt root"
          }
          "QT_ROOT=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $hostQtRoot = Get-ChildItem "C:\Qt\$env:QT_VERSION" -Directory |
            Where-Object { $_.Name -notlike "*arm64*" -and (Test-Path (Join-Path $_.FullName "bin\windeployqt.exe")) } |
            Select-Object -First 1 -ExpandProperty FullName
          if ($hostQtRoot) {
            "QT_HOST_ROOT=$hostQtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          $args = @(
            "-S", "clashauto-c++",
            "-B", $env:BUILD_DIR,
            "-G", "Visual Studio 17 2022",
            "-A", "${{ matrix.cmake_arch }}",
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT",
            "-DAPP_VERSION=$env:APP_VERSION"
          )
          if ("${{ matrix.arch }}" -eq "arm64") {
            $args += "-DQT_HOST_PATH=$env:QT_HOST_ROOT"
          }
          cmake @args

      - name: Build
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Stage portable app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $stage = Join-Path $pwd $env:STAGE_DIR
          $appDir = Join-Path $stage "clashauto-c++"
          $resourceDir = Join-Path $stage "Clashr-Auto"

          New-Item -ItemType Directory -Force $appDir, $resourceDir | Out-Null
          Copy-Item "$env:BUILD_DIR\Release\clashauto-cpp.exe" $appDir -Force

          $deployTool = Join-Path $env:QT_ROOT "bin\windeployqt.exe"
          if (-not (Test-Path $deployTool)) {
            $deployTool = Join-Path $env:QT_ROOT "bin\windeployqt.bat"
          }
          if (-not (Test-Path $deployTool) -and $env:QT_HOST_ROOT) {
            $deployTool = Join-Path $env:QT_HOST_ROOT "bin\windeployqt.exe"
          }
          if (-not (Test-Path $deployTool)) {
            throw "Cannot find windeployqt"
          }
          & $deployTool --release --no-translations "$appDir\clashauto-cpp.exe"

          # 显式打包 MSVC 运行库：--compiler-runtime 实测不落 msvcp140_1/_2.dll，
          # 未装 VC++ redist 的机器启动即 0xC0000135（真机验证）。从 VC Tools Redist 目录直接复制。
          $redistRoots = @()
          if ($env:VCToolsRedistDir) { $redistRoots += $env:VCToolsRedistDir }
          $redistRoots += (Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Redist\MSVC" -Directory -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName })
          $crtDir = $null
          foreach ($rr in $redistRoots) {
            $crtDir = Get-ChildItem (Join-Path $rr "*\${{ matrix.arch }}\Microsoft.VC*.CRT") -Directory -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
            if ($crtDir) { break }
          }
          if ($crtDir) {
            Write-Host "Copying MSVC runtime from $crtDir"
            Copy-Item (Join-Path $crtDir "*.dll") $appDir -Force
          } else {
            Write-Host "WARNING: MSVC runtime CRT dir not found; package may need VC++ redist"
          }

          $resourceItems = @("command", "config", "language", "mihomo", "static", "version")
          foreach ($item in $resourceItems) {
            $source = Join-Path "Clashr-Auto" $item
            if (-not (Test-Path $source)) {
              Write-Host "Skipping missing resource: $source"
              continue
            }

            $target = Join-Path $resourceDir $item
            if (Test-Path $source -PathType Container) {
              robocopy $source $target /E /NFL /NDL /NJH /NJS /NP
              if ($LASTEXITCODE -le 7) {
                $global:LASTEXITCODE = 0
              } else {
                exit $LASTEXITCODE
              }
            } else {
              New-Item -ItemType Directory -Force (Split-Path $target) | Out-Null
              Copy-Item $source $target -Force
            }
          }

          if (-not (Test-Path "$appDir\clashauto-cpp.exe")) {
            throw "Missing staged executable"
          }
          if (-not (Test-Path "$resourceDir\config\config.yaml")) {
            throw "Missing staged Clashr-Auto config resources"
          }
          # 内核不再随包分发：不校验 command\clash 下的核心是否存在

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "$env:STAGE_DIR\*" -DestinationPath "dist\ClashAuto-$env:APP_VERSION-windows-${{ matrix.arch }}-portable.zip" -Force

      - name: Create installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $nsi = @'
          Unicode true
          Name "Clash Auto"
          OutFile "dist\ClashAuto-$%APP_VERSION%-windows-$%APP_ARCH%-setup.exe"
          InstallDir "$LOCALAPPDATA\ClashAuto"
          RequestExecutionLevel user

          Page directory
          Page instfiles
          UninstPage uninstConfirm
          UninstPage instfiles

          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "dist\package\ClashAuto\*"
            CreateDirectory "$SMPROGRAMS\Clash Auto"
            CreateShortcut "$SMPROGRAMS\Clash Auto\Clash Auto.lnk" "$INSTDIR\clashauto-c++\clashauto-cpp.exe"
            CreateShortcut "$DESKTOP\Clash Auto.lnk" "$INSTDIR\clashauto-c++\clashauto-cpp.exe"
            WriteUninstaller "$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$DESKTOP\Clash Auto.lnk"
            Delete "$SMPROGRAMS\Clash Auto\Clash Auto.lnk"
            RMDir "$SMPROGRAMS\Clash Auto"
            RMDir /r "$INSTDIR"
          SectionEnd
          '@
          $nsi = $nsi.Replace('$%APP_VERSION%', $env:APP_VERSION)
          $nsi = $nsi.Replace('$%APP_ARCH%', '${{ matrix.arch }}')
          $nsi | Set-Content -Path installer.nsi -Encoding UTF8
          makensis installer.nsi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClashAuto-windows-${{ matrix.arch }}
          path: |
            dist/ClashAuto-*-windows-${{ matrix.arch }}-portable.zip
            dist/ClashAuto-*-windows-${{ matrix.arch }}-setup.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Clash Auto ${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          files: |
            dist/ClashAuto-*

  macos:
    name: macOS universal (x86_64 + arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          # 基线 major.minor 取自 CMakeLists，构建号用 git 提交数自动递增（每次提交 +1）
          base="$(sed -nE 's/.*project\s*\(\s*[^ ]+\s+VERSION\s+([0-9]+(\.[0-9]+){1,3}).*/\1/p' clashauto-c++/CMakeLists.txt | head -n 1)"
          if [ -z "$base" ]; then
            echo "Cannot find project VERSION in clashauto-c++/CMakeLists.txt" >&2
            exit 1
          fi
          major="$(echo "$base" | cut -d. -f1)"
          minor="$(echo "$base" | cut -d. -f2)"
          [ -n "$minor" ] || minor=0
          build="$(git rev-list --count HEAD)"
          version="${major}.${minor}.${build}"
          {
            echo "APP_VERSION=$version"
            echo "RELEASE_TAG=v$version"
          } >> "$GITHUB_ENV"
          echo "Release version: $version (build number = commit count)"

      - name: Download runtime resources
        shell: bash
        run: |
          set -euo pipefail
          # v2.5.7 没有 mac 资源包：用 linux 包里的平台无关资源（config/、language/、version）。
          # command/ 下的 sysproxy/wintun 都是别的平台的二进制，mac 不拷；核心由用户在
          # 「设置 → 系统」按需下载 mihomo-darwin（更新内核已支持 darwin 资产）。
          url="https://github.com/ClashrAuto/Clashr-Auto-Desktop/releases/download/${RUNTIME_RELEASE_TAG}/${RUNTIME_LINUX_ASSET}"
          zip_path="${RUNNER_TEMP}/${RUNTIME_LINUX_ASSET}"
          curl -L --fail --retry 3 -o "$zip_path" "$url"
          rm -rf Clashr-Auto
          mkdir -p Clashr-Auto

          python3 - "$zip_path" <<'PY'
          import pathlib
          import sys
          import zipfile

          zip_path = pathlib.Path(sys.argv[1])
          target_root = pathlib.Path("Clashr-Auto")
          prefixes = ("config/", "language/")
          with zipfile.ZipFile(zip_path) as archive:
              for entry in archive.infolist():
                  name = entry.filename.replace("\\", "/")
                  if not (name == "version" or name.startswith(prefixes)):
                      continue
                  target = target_root / name
                  if entry.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(entry) as src, target.open("wb") as dst:
                      dst.write(src.read())
          PY

          mkdir -p Clashr-Auto/command/clash
          if [ ! -f Clashr-Auto/config/config.yaml ]; then
            echo "Runtime resources did not contain config/config.yaml" >&2
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install ninja
          python3 -m pip install --user aqtinstall pillow \
            || python3 -m pip install --user --break-system-packages aqtinstall pillow

      - name: Install Qt (universal)
        shell: bash
        run: |
          set -euo pipefail
          # aqt 的 mac 官方构建即 x86_64+arm64 通用二进制
          python3 -m aqt install-qt mac desktop "$QT_VERSION" clang_64 -O "$HOME/Qt"
          echo "QT_ROOT=$HOME/Qt/$QT_VERSION/macos" >> "$GITHUB_ENV"

      - name: Generate icon.icns
        shell: bash
        run: |
          set -euo pipefail
          # 从 assets/icon.ico 取最大帧生成 iconset → icns；CMake 检测到该文件即打进 Resources
          python3 - <<'PY'
          from PIL import Image
          import pathlib

          ico = Image.open("clashauto-c++/assets/icon.ico")
          sizes = sorted(ico.info.get("sizes") or {ico.size})
          ico.size = sizes[-1]
          ico.load()
          base = ico.convert("RGBA")
          out = pathlib.Path("icon.iconset")
          out.mkdir(exist_ok=True)
          for s in (16, 32, 128, 256, 512):
              base.resize((s, s), Image.LANCZOS).save(out / f"icon_{s}x{s}.png")
              base.resize((s * 2, s * 2), Image.LANCZOS).save(out / f"icon_{s}x{s}@2x.png")
          PY
          iconutil -c icns -o clashauto-c++/assets/icon.icns icon.iconset

      - name: Configure
        shell: bash
        run: |
          cmake -S clashauto-c++ -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPP_VERSION="$APP_VERSION" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Build
        shell: bash
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Verify universal binary
        shell: bash
        run: |
          set -euo pipefail
          bin="$BUILD_DIR/Clash Auto.app/Contents/MacOS/Clash Auto"
          lipo -archs "$bin"
          lipo -archs "$bin" | grep -q x86_64
          lipo -archs "$bin" | grep -q arm64

      - name: Stage app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP="$BUILD_DIR/Clash Auto.app"
          "$QT_ROOT/bin/macdeployqt" "$APP" -verbose=1

          # 运行时资源进 bundle：Contents/Clashr-Auto。AppConfigLoader 从 exe 目录
          # (Contents/MacOS) 向上探测 ../Clashr-Auto 第一跳即命中，拖进 /Applications 也不丢
          mkdir -p "$APP/Contents/Clashr-Auto"
          for item in command config language version; do
            if [ -e "Clashr-Auto/$item" ]; then
              cp -a "Clashr-Auto/$item" "$APP/Contents/Clashr-Auto/"
            fi
          done
          test -f "$APP/Contents/Clashr-Auto/config/config.yaml"

          # ad-hoc 签名：Apple Silicon 拒绝运行完全无签名的 arm64 二进制；
          # macdeployqt 改过 frameworks、资源也已放入，最后整体重签一次
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/dmgroot
          ditto "$BUILD_DIR/Clash Auto.app" "dist/dmgroot/Clash Auto.app"
          ln -s /Applications dist/dmgroot/Applications
          hdiutil create -volname "Clash Auto" -srcfolder dist/dmgroot -ov -format UDZO \
            "dist/ClashAuto-${APP_VERSION}-macos-universal.dmg"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClashAuto-macos-universal
          path: |
            dist/ClashAuto-*-macos-universal.dmg

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Clash Auto ${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          files: |
            dist/ClashAuto-*

  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
            deb_arch: amd64
            clash_core: clash-linux-amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            clash_core: clash-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          # 基线 major.minor 取自 CMakeLists，构建号用 git 提交数自动递增（每次提交 +1）
          base="$(sed -nE 's/.*project\s*\(\s*[^ ]+\s+VERSION\s+([0-9]+(\.[0-9]+){1,3}).*/\1/p' clashauto-c++/CMakeLists.txt | head -n 1)"
          if [ -z "$base" ]; then
            echo "Cannot find project VERSION in clashauto-c++/CMakeLists.txt" >&2
            exit 1
          fi
          major="$(echo "$base" | cut -d. -f1)"
          minor="$(echo "$base" | cut -d. -f2)"
          [ -n "$minor" ] || minor=0
          build="$(git rev-list --count HEAD)"
          version="${major}.${minor}.${build}"
          {
            echo "APP_VERSION=$version"
            echo "RELEASE_TAG=v$version"
          } >> "$GITHUB_ENV"
          echo "Release version: $version (build number = commit count)"

      - name: Download runtime resources
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/ClashrAuto/Clashr-Auto-Desktop/releases/download/${RUNTIME_RELEASE_TAG}/${RUNTIME_LINUX_ASSET}"
          zip_path="${RUNNER_TEMP}/${RUNTIME_LINUX_ASSET}"
          curl -L --fail --retry 3 -o "$zip_path" "$url"
          rm -rf Clashr-Auto
          mkdir -p Clashr-Auto

          python3 - "$zip_path" <<'PY'
          import pathlib
          import sys
          import zipfile

          zip_path = pathlib.Path(sys.argv[1])
          target_root = pathlib.Path("Clashr-Auto")
          prefixes = ("command/", "config/", "language/")
          with zipfile.ZipFile(zip_path) as archive:
              for entry in archive.infolist():
                  name = entry.filename.replace("\\", "/")
                  if not (name == "version" or name.startswith(prefixes)):
                      continue
                  # 不再预装内核：跳过 command/clash/ 下的核心二进制（用户在设置里按需下载）
                  if name.startswith("command/clash/"):
                      continue
                  target = target_root / name
                  if entry.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(entry) as src, target.open("wb") as dst:
                      dst.write(src.read())
          PY

          if [ ! -f Clashr-Auto/config/config.yaml ]; then
            echo "Runtime resources did not contain config/config.yaml" >&2
            exit 1
          fi

      - name: Prepare runtime core dir (no pre-bundled core)
        shell: bash
        run: |
          set -euo pipefail
          # 不再预装内核：不下载、不校验核心，仅保留空的 clash 目录占位。
          # 用户首次运行时由应用引导到「设置 → 系统」按需下载 mihomo。
          mkdir -p Clashr-Auto/command/clash

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-tools-dev-tools \
            libgl1-mesa-dev \
            fakeroot \
            zip

      - name: Configure
        shell: bash
        run: cmake -S clashauto-c++ -B "$BUILD_DIR" -G Ninja -DCMAKE_BUILD_TYPE=Release -DAPP_VERSION="$APP_VERSION"

      - name: Build
        shell: bash
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Stage portable app
        shell: bash
        run: |
          set -euo pipefail
          stage="$STAGE_DIR"
          app_dir="$stage/clashauto-c++"
          resource_dir="$stage/Clashr-Auto"
          rm -rf "$stage"
          mkdir -p "$app_dir" "$resource_dir"

          cp "$BUILD_DIR/clashauto-cpp" "$app_dir/"
          chmod +x "$app_dir/clashauto-cpp"

          for item in command config language mihomo static version; do
            if [ -e "Clashr-Auto/$item" ]; then
              cp -a "Clashr-Auto/$item" "$resource_dir/"
            else
              echo "Skipping missing resource: Clashr-Auto/$item"
            fi
          done

          test -x "$app_dir/clashauto-cpp"
          test -f "$resource_dir/config/config.yaml"
          # 内核不再随包分发：不校验 command/clash 下的核心是否存在

      - name: Create portable tar.gz
        shell: bash
        run: |
          mkdir -p dist
          tar -C dist/package -czf "dist/ClashAuto-${APP_VERSION}-linux-${{ matrix.arch }}-portable.tar.gz" ClashAuto
          (cd dist/package && zip -r "../ClashAuto-${APP_VERSION}-linux-${{ matrix.arch }}-portable.zip" ClashAuto)

      - name: Create deb package
        shell: bash
        run: |
          set -euo pipefail
          pkg_root="dist/deb/ClashAuto"
          install_root="$pkg_root/opt/ClashAuto"
          mkdir -p "$install_root" "$pkg_root/usr/share/applications" "$pkg_root/usr/bin" "$pkg_root/DEBIAN"

          cp -a "$STAGE_DIR/." "$install_root/"
          ln -s /opt/ClashAuto/clashauto-c++/clashauto-cpp "$pkg_root/usr/bin/clashauto-cpp"

          cat > "$pkg_root/usr/share/applications/clashauto.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Clash Auto
          Exec=/opt/ClashAuto/clashauto-c++/clashauto-cpp
          Terminal=false
          Categories=Network;
          EOF

          installed_size="$(du -sk "$install_root" | cut -f1)"
          cat > "$pkg_root/DEBIAN/control" <<EOF
          Package: clashauto
          Version: ${APP_VERSION}
          Section: net
          Priority: optional
          Architecture: ${{ matrix.deb_arch }}
          Installed-Size: ${installed_size}
          Maintainer: Clash Auto <auto@clash.com>
          Depends: libc6, libstdc++6, libqt6core6 | libqt6core6t64, libqt6gui6 | libqt6gui6t64, libqt6widgets6 | libqt6widgets6t64, libqt6network6 | libqt6network6t64
          Description: Clash Auto Qt desktop client
           Clash Auto desktop client built with Qt Widgets.
          EOF

          fakeroot dpkg-deb --build "$pkg_root" "dist/ClashAuto-${APP_VERSION}-linux-${{ matrix.arch }}.deb"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClashAuto-linux-${{ matrix.arch }}
          path: |
            dist/ClashAuto-*-linux-${{ matrix.arch }}-portable.tar.gz
            dist/ClashAuto-*-linux-${{ matrix.arch }}-portable.zip
            dist/ClashAuto-*-linux-${{ matrix.arch }}.deb

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Clash Auto ${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          files: |
            dist/ClashAuto-*
