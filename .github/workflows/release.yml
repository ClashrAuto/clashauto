name: Build and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: ClashAuto
  QT_VERSION: 6.8.3
  QT_ARCH: win64_msvc2022_64
  BUILD_DIR: build-release
  STAGE_DIR: dist/package/ClashAuto

jobs:
  windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout runtime resources
        uses: actions/checkout@v4
        with:
          repository: ClashrAuto/Clashr-Auto-Desktop
          path: Clashr-Auto
          sparse-checkout: |
            command
            config
            language
            mihomo
            static
            version

      - name: Read CMake project version
        shell: pwsh
        run: |
          $cmake = Get-Content "clashauto-c++\CMakeLists.txt" -Raw
          if ($cmake -notmatch 'project\s*\(\s*\S+\s+VERSION\s+([0-9]+(?:\.[0-9]+){1,3})') {
            throw "Cannot find project VERSION in clashauto-c++\CMakeLists.txt"
          }

          $version = $Matches[1]
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Release version: $version"

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH -O C:\Qt
          "QT_ROOT=C:\Qt\$env:QT_VERSION\msvc2022_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S clashauto-c++ -B $env:BUILD_DIR -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT"

      - name: Build
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Stage portable app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $stage = Join-Path $pwd $env:STAGE_DIR
          $appDir = Join-Path $stage "clashauto-c++"
          $resourceDir = Join-Path $stage "Clashr-Auto"

          New-Item -ItemType Directory -Force $appDir, $resourceDir | Out-Null
          Copy-Item "$env:BUILD_DIR\Release\clashauto-cpp.exe" $appDir -Force

          & "$env:QT_ROOT\bin\windeployqt.exe" --release --no-translations "$appDir\clashauto-cpp.exe"

          $resourceItems = @("command", "config", "language", "mihomo", "static", "version")
          foreach ($item in $resourceItems) {
            $source = Join-Path "Clashr-Auto" $item
            if (-not (Test-Path $source)) {
              Write-Host "Skipping missing resource: $source"
              continue
            }

            $target = Join-Path $resourceDir $item
            if (Test-Path $source -PathType Container) {
              robocopy $source $target /E /NFL /NDL /NJH /NJS /NP
              if ($LASTEXITCODE -le 7) {
                $global:LASTEXITCODE = 0
              } else {
                exit $LASTEXITCODE
              }
            } else {
              New-Item -ItemType Directory -Force (Split-Path $target) | Out-Null
              Copy-Item $source $target -Force
            }
          }

          if (-not (Test-Path "$appDir\clashauto-cpp.exe")) {
            throw "Missing staged executable"
          }
          if (-not (Test-Path "$resourceDir\config\config.yaml")) {
            throw "Missing staged Clashr-Auto config resources"
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "$env:STAGE_DIR\*" -DestinationPath "dist\ClashAuto-$env:APP_VERSION-windows-x64-portable.zip" -Force

      - name: Create installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $nsi = @'
          Unicode true
          Name "Clash Auto"
          OutFile "dist\ClashAuto-$%APP_VERSION%-windows-x64-setup.exe"
          InstallDir "$LOCALAPPDATA\ClashAuto"
          RequestExecutionLevel user

          Page directory
          Page instfiles
          UninstPage uninstConfirm
          UninstPage instfiles

          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "dist\package\ClashAuto\*"
            CreateDirectory "$SMPROGRAMS\Clash Auto"
            CreateShortcut "$SMPROGRAMS\Clash Auto\Clash Auto.lnk" "$INSTDIR\clashauto-c++\clashauto-cpp.exe"
            CreateShortcut "$DESKTOP\Clash Auto.lnk" "$INSTDIR\clashauto-c++\clashauto-cpp.exe"
            WriteUninstaller "$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$DESKTOP\Clash Auto.lnk"
            Delete "$SMPROGRAMS\Clash Auto\Clash Auto.lnk"
            RMDir "$SMPROGRAMS\Clash Auto"
            RMDir /r "$INSTDIR"
          SectionEnd
          '@
          $nsi = $nsi.Replace('$%APP_VERSION%', $env:APP_VERSION)
          $nsi | Set-Content -Path installer.nsi -Encoding UTF8
          makensis installer.nsi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClashAuto-windows-x64
          path: |
            dist/ClashAuto-*-windows-x64-portable.zip
            dist/ClashAuto-*-windows-x64-setup.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Clash Auto ${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: |
            dist/ClashAuto-*-windows-x64-portable.zip
            dist/ClashAuto-*-windows-x64-setup.exe
